<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Corporativo - Canal Interno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Panel de Comunicación Interno</h2>
            <p>Proyecto Universitario</p>
        </div>

        <div id="messages" class="messages-area">
            </div>

        <form id="chat-form" class="chat-form">
            <input type="text" id="username" placeholder="Tu Nombre..." required autocomplete="off">
            <input type="text" id="message-input" placeholder="Escribe un mensaje o comparte informacion..." required autocomplete="off">
            <button type="submit" id="send-btn">Enviar</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const usernameInput = document.getElementById('username');
        const messagesArea = document.getElementById('messages');

        // Escuchar cuando se envía un mensaje desde el formulario
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const user = usernameInput.value.trim();
            const text = messageInput.value.trim();

            if (user && text) {
                // Generar hora formateada en formato de 12 horas (a.m. / p.m.)
                const ahora = new Date();
                let horas = ahora.getHours();
                const minutos = ahora.getMinutes().toString().padStart(2, '0');
                const ampm = horas >= 12 ? 'p.m.' : 'a.m.';
                horas = horas % 12;
                horas = horas ? horas : 12; 
                const horaFormateada = `${horas}:${minutos} ${ampm}`;

                const data = {
                    user: user,
                    text: text,
                    time: horaFormateada
                };

                // Enviar datos al servidor
                socket.emit('chat message', data);

                // Limpiar la barra donde se escribe el mensaje
                messageInput.value = '';
            }
        });

        // Escuchar los mensajes que el servidor envía (tanto nuevos como el historial)
        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.classList.add('message-block');
            item.innerHTML = `
                <span class="meta"><strong>${data.user}</strong> &middot; ${data.time}</span>
                <p class="text">${data.text}</p>
            `;
            messagesArea.appendChild(item);

            // Mantener el scroll siempre abajo en el último mensaje
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    </script>
</body>
</html>
